version: "3.8"

services:
  console:
    build: .
    ports:
      - "8973:8973"
    environment:
      - RUST_LOG=info
      - DATABASE_URL=postgresql://postgres:password@postgres:5439/wacht
      - REDIS_URL=redis://redis:6389
      - NATS_URL=nats://nats:4229
    depends_on:
      - postgres
      - redis
      - nats
    command: ["console"]
    restart: unless-stopped

  backend:
    build: .
    ports:
      - "8974:8973"
    environment:
      - RUST_LOG=info
      - DATABASE_URL=postgresql://postgres:password@postgres:5439/wacht
      - REDIS_URL=redis://redis:6389
      - NATS_URL=nats://nats:4229
    depends_on:
      - postgres
      - redis
      - nats
    command: ["backend"]
    restart: unless-stopped
    profiles: ["backend"]

  frontend:
    build: .
    ports:
      - "8975:8973"
    environment:
      - RUST_LOG=info
      - DATABASE_URL=postgresql://postgres:password@postgres:5439/wacht
      - REDIS_URL=redis://redis:6389
      - NATS_URL=nats://nats:4229
    depends_on:
      - postgres
      - redis
      - nats
    command: ["frontend"]
    restart: unless-stopped
    profiles: ["frontend"]

  realtime:
    build: .
    ports:
      - "8976:8973"
    environment:
      - RUST_LOG=info
      - DATABASE_URL=postgresql://postgres:password@postgres:5439/wacht
      - REDIS_URL=redis://redis:6389
      - NATS_URL=nats://nats:4229
    depends_on:
      - postgres
      - redis
      - nats
    command: ["realtime"]
    restart: unless-stopped

  worker:
    build: .
    environment:
      - RUST_LOG=info
      - DATABASE_URL=postgresql://postgres:password@postgres:5439/wacht
      - REDIS_URL=redis://redis:6389
      - NATS_URL=nats://nats:4229
    depends_on:
      - postgres
      - redis
      - nats
    command: ["worker"]
    restart: unless-stopped

  rate-limiter:
    build: .
    ports:
      - "8977:8973"
    environment:
      - RUST_LOG=info
      - DATABASE_URL=postgresql://postgres:password@postgres:5439/wacht
      - REDIS_URL=redis://redis:6389
    depends_on:
      - postgres
      - redis
    command: ["rate-limiter"]
    restart: unless-stopped

  postgres:
    image: postgres:16
    environment:
      - POSTGRES_DB=wacht
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    ports:
      - "5439:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6389:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  nats:
    image: nats:2.10-alpine
    ports:
      - "4229:4222"
      - "8229:8222"
    command: ["-js", "-m", "8222"]
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    driver: bridge
